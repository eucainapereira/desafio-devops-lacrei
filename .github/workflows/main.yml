name: CI/CD Pipeline Lacrei Saúde

on:
  push:
    branches: [ main, master, staging ]
  pull_request:
    branches: [ main, master ]

# Impede dois deploys simultâneos no mesmo ambiente
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Lint de código (ESLint)
  # ─────────────────────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2: Testes unitários
  # ─────────────────────────────────────────────
  test:
    name: "🧪 Testes Unitários"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 3: Build, Scan de Segurança e Push ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: "🐳 Build, Scan & Push"
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names app-lacrei-saude --region sa-east-1 || \
          aws ecr create-repository \
            --repository-name app-lacrei-saude \
            --region sa-east-1 \
            --image-scanning-configuration scanOnPush=true

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: app-lacrei-saude
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      # ── Trivy: Scan de vulnerabilidades ANTES do push ──
      - name: Trivy — Scan de Segurança da Imagem
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/app-lacrei-saude:${{ github.sha }}"
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: app-lacrei-saude
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.ref_name }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.ref_name }}

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ─────────────────────────────────────────────
  # JOB 4: Deploy Staging (branch: staging)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: "🚀 Deploy Staging"
    needs: build-and-push
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to App Runner (Staging)
        run: |
          echo "Atualizando ambiente de STAGING na Virgínia..."
          SERVICE_ARN=$(aws apprunner list-services --region us-east-1 \
            --query "ServiceSummaryList[?ServiceName=='app-lacrei-saude'].ServiceArn" \
            --output text)
          if [ -n "$SERVICE_ARN" ] && [ "$SERVICE_ARN" != "None" ]; then
            aws apprunner start-deployment --region us-east-1 --service-arn $SERVICE_ARN
          else
            echo "Serviço App Runner não encontrado ou ainda não provisionado."
          fi

  # ─────────────────────────────────────────────
  # JOB 5: Terraform Plan (gate de revisão — produção)
  #
  # O bootstrap do bucket S3 roda aqui mesmo, antes do terraform init,
  # no mesmo runner e mesma sessão AWS — sem race condition entre jobs.
  # ─────────────────────────────────────────────
  terraform-plan:
    name: "📋 Terraform Plan"
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      # ── Bootstrap: cria o bucket S3 se não existir (idempotente) ──
      # Nome inclui account ID para garantir unicidade global no S3.
      - name: Bootstrap — Garantir bucket S3 para o Terraform state
        run: |
          BUCKET="lacrei-tfstate-873011686071"
          REGION="sa-east-1"

          echo "🔍 Verificando se o bucket '$BUCKET' existe..."
          if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
            echo "✅ Bucket já existe."
          else
            echo "🪣 Criando bucket S3 '$BUCKET'..."
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'

            echo "✅ Bucket criado. Aguardando propagação..."
            sleep 5
          fi

          # Valida acesso antes de passar para o terraform init
          aws s3api list-objects-v2 --bucket "$BUCKET" --region "$REGION" > /dev/null
          echo "✅ Bucket acessível e pronto para o Terraform."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (com retry)
        working-directory: ./terraform
        run: |
          for i in 1 2 3; do
            echo "⚙️ terraform init — tentativa $i/3..."
            terraform init && echo "✅ Init concluído." && exit 0
            echo "⏳ Aguardando 20s antes de tentar novamente..."
            sleep 20
          done
          echo "❌ terraform init falhou após 3 tentativas."
          exit 1

      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan \
            -var="ecr_repository_url=873011686071.dkr.ecr.sa-east-1.amazonaws.com/app-lacrei-saude" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -out=tfplan
        continue-on-error: false

      - name: Upload Terraform Plan como artefato
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.sha }}
          path: terraform/tfplan
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 6: Deploy Produção (main/master)
  # ─────────────────────────────────────────────
  deploy-production:
    name: "🚀 Deploy Produção"
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.sha }}
          path: terraform/

      - name: Terraform Init (com retry)
        working-directory: ./terraform
        run: |
          for i in 1 2 3; do
            echo "⚙️ terraform init — tentativa $i/3..."
            terraform init && echo "✅ Init concluído." && exit 0
            echo "⏳ Aguardando 20s antes de tentar novamente..."
            sleep 20
          done
          echo "❌ terraform init falhou após 3 tentativas."
          exit 1

      - name: Terraform Import — Reconciliar recursos existentes na AWS
        working-directory: ./terraform
        run: |
          # Importa recursos que já existem na AWS mas não estão no Terraform state.
          # Idempotente: o || true garante que o passo só falha se o import "pegar" um recurso errado.
          # Na primeira execução após state vazio, isso evita o erro "resource already exists".

          echo "🔍 Verificando recursos existentes para importar..."

          # ── ALB ──
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names lacrei-saude-alb \
            --query "LoadBalancers[0].LoadBalancerArn" \
            --output text --region sa-east-1 2>/dev/null || echo "")
          if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ] && [ "$ALB_ARN" != "null" ]; then
            echo "📥 Importando ALB: $ALB_ARN"
            terraform import -var="ecr_repository_url=873011686071.dkr.ecr.sa-east-1.amazonaws.com/app-lacrei-saude" \
              -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
              aws_lb.app_lb "$ALB_ARN" || true
          fi

          # ── CloudWatch Log Group ──
          CW_EXISTS=$(aws logs describe-log-groups \
            --log-group-name-prefix "/lacrei/app/docker" \
            --query "logGroups[0].logGroupName" \
            --output text --region sa-east-1 2>/dev/null || echo "")
          if [ -n "$CW_EXISTS" ] && [ "$CW_EXISTS" != "None" ] && [ "$CW_EXISTS" != "null" ]; then
            echo "📥 Importando Log Group: $CW_EXISTS"
            terraform import -var="ecr_repository_url=873011686071.dkr.ecr.sa-east-1.amazonaws.com/app-lacrei-saude" \
              -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
              aws_cloudwatch_log_group.app_logs "$CW_EXISTS" || true
          fi

          # ── SNS Topic ──
          SNS_ARN=$(aws sns list-topics \
            --query "Topics[?contains(TopicArn,'lacrei-saude-alerts')].TopicArn | [0]" \
            --output text --region sa-east-1 2>/dev/null || echo "")
          if [ -n "$SNS_ARN" ] && [ "$SNS_ARN" != "None" ] && [ "$SNS_ARN" != "null" ]; then
            echo "📥 Importando SNS Topic: $SNS_ARN"
            terraform import -var="ecr_repository_url=873011686071.dkr.ecr.sa-east-1.amazonaws.com/app-lacrei-saude" \
              -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
              aws_sns_topic.alerts "$SNS_ARN" || true
          fi

          # ── SSM Parameter ──
          SSM_EXISTS=$(aws ssm describe-parameters \
            --filters "Key=Name,Values=/lacrei/last-successful-image-tag" \
            --query "Parameters[0].Name" \
            --output text --region sa-east-1 2>/dev/null || echo "")
          if [ -n "$SSM_EXISTS" ] && [ "$SSM_EXISTS" != "None" ] && [ "$SSM_EXISTS" != "null" ]; then
            echo "📥 Importando SSM Parameter: $SSM_EXISTS"
            terraform import -var="ecr_repository_url=873011686071.dkr.ecr.sa-east-1.amazonaws.com/app-lacrei-saude" \
              -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
              aws_ssm_parameter.last_deployed_image_tag "$SSM_EXISTS" || true
          fi

          echo "✅ Reconciliação de state concluída."

      - name: Terraform Apply (usando plano aprovado)
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan


      # ── Gravar SHA da imagem deployada com sucesso no SSM ──
      - name: Registrar imagem deployada no SSM (base do rollback)
        run: |
          aws ssm put-parameter \
            --name "/lacrei/last-successful-image-tag" \
            --value "${{ github.sha }}" \
            --type String \
            --overwrite \
            --region sa-east-1

      # ── Smoke Test: valida se o ALB responde após o deploy ──
      - name: Smoke Test — Validar endpoint de saúde
        run: |
          echo "Aguardando aplicação iniciar..."
          sleep 60
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names lacrei-saude-alb \
            --query "LoadBalancers[0].DNSName" \
            --output text \
            --region sa-east-1)

          echo "Testando endpoint: https://$ALB_DNS/health"
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://$ALB_DNS/health" || echo "000")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Smoke test falhou! HTTP Status: $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Smoke test passou! HTTP Status: $HTTP_STATUS"

  # ─────────────────────────────────────────────
  # JOB 7: Rollback automático (em falha do deploy)
  # ─────────────────────────────────────────────
  rollback:
    name: "⏪ Rollback Automático"
    needs: deploy-production
    if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Obter última imagem estável do SSM
        id: get-stable-tag
        run: |
          STABLE_TAG=$(aws ssm get-parameter \
            --name "/lacrei/last-successful-image-tag" \
            --query "Parameter.Value" \
            --output text \
            --region sa-east-1 2>/dev/null || echo "latest")
          echo "stable_tag=$STABLE_TAG" >> $GITHUB_OUTPUT
          echo "🔄 Realizando rollback para imagem: $STABLE_TAG"

      # ── Bootstrap S3 também no rollback ──
      # O rollback pode ser acionado mesmo quando terraform-plan falhou antes de criar o bucket.
      - name: Bootstrap — Garantir bucket S3 para o Terraform state
        run: |
          BUCKET="lacrei-tfstate-873011686071"
          REGION="sa-east-1"

          if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
            echo "✅ Bucket já existe."
          else
            echo "🪣 Criando bucket S3 '$BUCKET'..."
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'

            sleep 5
          fi

          aws s3api list-objects-v2 --bucket "$BUCKET" --region "$REGION" > /dev/null
          echo "✅ Bucket acessível."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (com retry)
        working-directory: ./terraform
        run: |
          for i in 1 2 3; do
            echo "⚙️ terraform init — tentativa $i/3..."
            terraform init && echo "✅ Init concluído." && exit 0
            echo "⏳ Aguardando 20s antes de tentar novamente..."
            sleep 20
          done
          echo "❌ terraform init falhou após 3 tentativas."
          exit 1

      - name: Terraform Apply com imagem estável
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -var="ecr_repository_url=873011686071.dkr.ecr.sa-east-1.amazonaws.com/app-lacrei-saude" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="image_tag=${{ steps.get-stable-tag.outputs.stable_tag }}"

